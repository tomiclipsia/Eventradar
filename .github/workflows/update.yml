name: Update EventRadar

on:
  schedule:
    - cron: "0 4 * * 1"   # Jeden Montag 06:00 Uhr DE-Zeit
  workflow_dispatch:        # Manueller Start möglich

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scrape & update
        run: python scraper.py
      - name: Commit & push
        run: |
          git config user.name "EventRadar Bot"
          git config user.email "bot@eventradar"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Events aktualisiert $(date '+%d.%m.%Y')"
          git push
